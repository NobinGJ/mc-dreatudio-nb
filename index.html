<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambios Hardcore Xtreme</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Efecto de sangre (flash rojo al cambiar) -->
    <div class="blood-flash" id="blood-flash"></div>

    <!-- Indicador de Día -->
    <div class="day-indicator" id="day-indicator">Día 2</div>

    <!-- Logos fijos -->
    <img src="logo_mmd.png" alt="Logo del Studio" class="studio-logo">
    <img src="logo-evento.png" alt="Logo del Evento" class="event-logo">

    <!-- Contenedor simple sin interfaz -->
    <div class="carousel" id="carousel">
        <!-- Las imágenes se inyectarán aquí -->
    </div>

    <!-- Audio de Fondo y Botón de Mute -->
    <audio id="bg-music" src="background.mp3" autoplay loop></audio>
    <button id="mute-btn" class="mute-btn" title="Silenciar / Activar Música">
        <svg id="mute-icon" viewBox="0 0 24 24" fill="white" width="24px" height="24px">
            <!-- Icono de volumen por defecto -->
            <path
                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
        </svg>
    </button>

    <script src="script.js"></script>
</body>

</html>
